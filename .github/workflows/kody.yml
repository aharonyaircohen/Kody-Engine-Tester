name: kody

on:
  workflow_dispatch:
    inputs:
      task_id:
        required: true
        type: string
      mode:
        type: string
        default: "full"
      from_stage:
        type: string
        default: ""
      issue_number:
        type: string
        default: ""
      feedback:
        type: string
        default: ""
      dry_run:
        type: boolean
        default: false
      provider:
        type: string
        default: ""
      model:
        type: string
        default: ""
      agent:
        description: "Agent to run (omit for all, used by watch)"
        required: false
        type: string
      sessionId:
        description: "Session ID for chat mode (kody-engine chat)"
        type: string
        default: ""
      message:
        description: "Initial chat message (creates session file)"
        type: string
        default: ""
      auto_mode:
        type: boolean
        default: false

  issue_comment:
    types: [created]

  pull_request:
    types: [closed]

  pull_request_review:
    types: [submitted]

  workflow_run:
    workflows: ["CI"]
    types: [completed]

  push:
    branches: [main, dev]
    paths: ["src/**", "kody.config.json", "package.json"]

  schedule:
    - cron: "*/30 * * * *"

concurrency:
  group: kody-${{ github.event.inputs.task_id || github.event.issue.number || github.event.pull_request.number || github.event.workflow_run.id || github.sha }}
  cancel-in-progress: false

permissions:
  issues: write
  pull-requests: write
  contents: write

jobs:
  # ─── Parse (issue_comment trigger only) ──────────────────────────────────────
  parse:
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.state != 'closed' &&
      github.event.comment.user.type != 'Bot' &&
      (contains(github.event.comment.body, '@kody') || contains(github.event.comment.body, '/kody'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      task_id: ${{ steps.parse.outputs.task_id }}
      mode: ${{ steps.parse.outputs.mode }}
      from_stage: ${{ steps.parse.outputs.from_stage }}
      issue_number: ${{ steps.parse.outputs.issue_number }}
      pr_number: ${{ steps.parse.outputs.pr_number }}
      feedback: ${{ steps.parse.outputs.feedback }}
      ci_run_id: ${{ steps.parse.outputs.ci_run_id }}
      ticket_id: ${{ steps.parse.outputs.ticket_id }}
      prd_file: ${{ steps.parse.outputs.prd_file }}
      dry_run: ${{ steps.parse.outputs.dry_run }}
      bump: ${{ steps.parse.outputs.bump }}
      finalize: ${{ steps.parse.outputs.finalize }}
      no_publish: ${{ steps.parse.outputs.no_publish }}
      no_notify: ${{ steps.parse.outputs.no_notify }}
      revert_target: ${{ steps.parse.outputs.revert_target }}
      valid: ${{ steps.parse.outputs.valid }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Kody Engine
        run: npm install -g @kody-ade/engine

      - name: Validate author
        id: safety
        run: |
          ALLOWED="COLLABORATOR MEMBER OWNER"
          ASSOC="${{ github.event.comment.author_association }}"
          if echo "$ALLOWED" | grep -qw "$ASSOC"; then
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo "valid=false" >> $GITHUB_OUTPUT
            echo "reason=Author association '$ASSOC' not allowed" >> $GITHUB_OUTPUT
          fi

      - name: Add reaction
        if: steps.safety.outputs.valid == 'true'
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            })

      - name: Parse inputs
        if: steps.safety.outputs.valid == 'true'
        id: parse
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_IS_PR: ${{ github.event.issue.pull_request && 'true' || '' }}
          TRIGGER_TYPE: comment
          COMMENT_AUTHOR_ASSOC: ${{ github.event.comment.author_association }}
        run: kody-engine ci-parse

  # ─── Orchestrate ─────────────────────────────────────────────────────────────
  orchestrate:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request_review' ||
      (github.event_name == 'issue_comment' && needs.parse.result == 'success' && needs.parse.outputs.valid == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Generate App token
        id: app-token
        if: vars.KODY_APP_ID != ''
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.KODY_APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: ${{ github.event.repository.name }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}

      - name: Checkout PR branch (for fix/rerun/review on PRs)
        if: github.event.inputs.mode == 'fix' || github.event.inputs.mode == 'fix-ci' || github.event.inputs.mode == 'rerun' || github.event.inputs.mode == 'review' || github.event.inputs.mode == 'resolve'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ github.event.issue.number }}"
          PR_BRANCH=$(gh pr view "$PR_NUM" --json headRefName -q '.headRefName')
          echo "Checking out PR branch: $PR_BRANCH"
          git checkout "$PR_BRANCH"
          git pull origin "$PR_BRANCH"

      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Kody Engine
        run: npm install -g @kody-ade/engine

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install LiteLLM proxy
        run: pip install 'litellm[proxy]' prisma && python -m prisma py fetch

      - name: Configure git
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Export project secrets
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
        run: kody-engine ci-export-secrets

      - name: Run Kody pipeline
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          TASK_ID: ${{ github.event.inputs.task_id || needs.parse.outputs.task_id }}
          MODE: ${{ github.event.inputs.mode || needs.parse.outputs.mode || 'full' }}
          FROM_STAGE: ${{ github.event.inputs.from_stage || needs.parse.outputs.from_stage }}
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number || needs.parse.outputs.issue_number }}
          PR_NUMBER: ${{ needs.parse.outputs.pr_number }}
          FEEDBACK: ${{ github.event.inputs.feedback || needs.parse.outputs.feedback }}
          COMPLEXITY: ${{ needs.parse.outputs.complexity }}
          CI_RUN_ID: ${{ needs.parse.outputs.ci_run_id }}
          TICKET_ID: ${{ needs.parse.outputs.ticket_id }}
          PRD_FILE: ${{ needs.parse.outputs.prd_file }}
          DRY_RUN: ${{ github.event.inputs.dry_run || needs.parse.outputs.dry_run || 'false' }}
          AUTO_MODE: ${{ github.event.inputs.auto_mode }}
          BUMP: ${{ needs.parse.outputs.bump }}
          FINALIZE: ${{ needs.parse.outputs.finalize }}
          NO_PUBLISH: ${{ needs.parse.outputs.no_publish }}
          NO_NOTIFY: ${{ needs.parse.outputs.no_notify }}
          REVERT_TARGET: ${{ needs.parse.outputs.revert_target }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: kody-engine $(kody-engine ci-build-args)

      - name: Pipeline summary
        if: always()
        env:
          TASK_ID: ${{ github.event.inputs.task_id || needs.parse.outputs.task_id }}
          TASK_DIR: .kody/tasks
        run: kody-engine ci-summarize

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: kody-tasks-${{ github.event.inputs.task_id || needs.parse.outputs.task_id }}
          path: .kody/tasks/
          retention-days: 3

  # ─── Close Issue on PR Merge ────────────────────────────────────────────────
  close-issue-on-merge:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Generate App token
        id: app-token
        if: vars.KODY_APP_ID != ''
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.KODY_APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: ${{ github.event.repository.name }}

      - name: Close linked issue
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          PAYLOAD: ${{ toJSON(github.event) }}
        run: kody-engine ci-close-issue

  # ─── Error Notifications ─────────────────────────────────────────────────────
  notify-parse-error:
    if: >-
      github.event_name == 'issue_comment' &&
      needs.parse.outputs.valid != 'true' &&
      (contains(github.event.comment.body, '@kody') || contains(github.event.comment.body, '/kody'))
    needs: [parse]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '❌ Failed to parse command.\n\nUsage: `@kody [full|rerun|fix|fix-ci|review|resolve|status] [--from <stage>] [--feedback "<text>"]`'
            })

  notify-orchestrate-error:
    if: failure() && needs.orchestrate.result == 'failure'
    needs: [orchestrate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = Number('${{ github.event.inputs.issue_number || needs.parse.outputs.issue_number || 0 }}');
            if (issueNumber > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `❌ Pipeline failed. [View logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
              });
            }

  # ─── Fix-CI Auto-trigger (workflow_run trigger) ─────────────────────────────
  fix-ci-trigger:
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Generate App token
        id: app-token
        if: vars.KODY_APP_ID != ''
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.KODY_APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: ${{ github.event.repository.name }}

      - name: Run fix-ci-trigger
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          PAYLOAD: ${{ toJSON(github.event) }}
        run: kody-engine fix-ci-trigger

  # ─── Auto-Merge After Kody Fix ───────────────────────────────────────────────
  auto-merge-after-fix:
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Auto merge PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.workflow_run.pull_requests[0];
            if (!pr) {
              core.info('No PR associated with this workflow run, skipping');
              return;
            }
            const prNumber = pr.number;

            // Loop guard: already merged
            if (pr.merged) {
              core.info(`PR #${prNumber} already merged, skipping`);
              return;
            }

            // Loop guard: cooldown — skip if "auto-merged" comment in last 60 min
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 30,
            });
            const oneHourAgo = new Date(Date.now() - 60 * 60 * 1000);
            const recentMerge = comments.data.find(
              (c) => c.body.includes('auto-merged') && new Date(c.created_at) > oneHourAgo
            );
            if (recentMerge) {
              core.info('Loop guard: auto-merge already attempted in last 60 min, skipping');
              return;
            }

            // Wait for CI to pass (poll up to ~15 min)
            let ciPassed = false;
            for (let i = 0; i < 18; i++) {
              await new Promise(r => setTimeout(r, 50 * 1000)); // 50s between checks
              const runs = await github.rest.actions.listWorkflowRunsForBranch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'ci.yml',
                branch: pr.head.ref,
                per_page: 1,
              });
              if (runs.data.workflow_runs.length > 0) {
                const status = runs.data.workflow_runs[0].conclusion;
                core.info(`CI run ${runs.data.workflow_runs[0].id} conclusion: ${status}`);
                if (status === 'success') {
                  ciPassed = true;
                  break;
                }
                if (status === 'failure' || status === 'cancelled' || status === 'timed_out') {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: prNumber,
                    body: `@kody auto-merge skipped: CI failed again after fix.\n\n[View CI logs](${runs.data.workflow_runs[0].html_url})`,
                  });
                  return;
                }
              }
            }

            if (!ciPassed) {
              core.info('CI did not pass in time, skipping auto-merge');
              return;
            }

            // Squash merge
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: 'squash',
                delete_branch: true,
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `@kody auto-merged ✅`,
              });
              core.info(`Auto-merged PR #${prNumber}`);
            } catch (e) {
              if (e.status === 405) {
                core.info(`PR #${prNumber} merge conflict or not ready, skipping`);
              } else {
                throw e;
              }
            }

  # ─── Chat ────────────────────────────────────────────────────────────────────
  chat:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.sessionId != ''
    runs-on: ubuntu-latest
    timeout-minutes: 360
    concurrency:
      group: chat-${{ github.event.inputs.sessionId }}
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Generate App token
        id: app-token
        if: vars.KODY_APP_ID != ''
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.KODY_APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: ${{ github.event.repository.name }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_DIR=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_DIR }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - run: pnpm install --frozen-lockfile

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Export project secrets
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
        run: kody-engine ci-export-secrets

      - name: Install kody-engine
        run: npm install -g @kody-ade/engine

      - name: Run chat session
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          SESSION_ID: ${{ github.event.inputs.sessionId }}
          MODEL: ${{ github.event.inputs.model || 'MiniMax-M2.7-highspeed' }}
          LOG_LEVEL: debug
          INITIAL_MESSAGE: ${{ github.event.inputs.message }}
        run: |
          mkdir -p .kody/sessions .kody/events .kody-engine

          if [ -n "$INITIAL_MESSAGE" ]; then
            TS=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)
            echo '{"role":"user","content":"'"$INITIAL_MESSAGE"'","timestamp":"'"$TS"'","toolCalls":[]}' \
              >> .kody/sessions/${SESSION_ID}.jsonl

            RUNID="chat-${SESSION_ID}-init"
            mkdir -p .kody-engine
            echo "[]" > .kody-engine/action-state.json
            jq --arg runid "$RUNID" --arg sess "$SESSION_ID" --arg instr "$INITIAL_MESSAGE" --arg ts "$TS" \
              '. + [{
                "actionId": $runid,
                "runId": $runid,
                "sessionId": $sess,
                "status": "waiting",
                "step": "chat",
                "instructions": [$instr],
                "cancel": false,
                "lastHeartbeat": $ts,
                "createdAt": $ts
              }]' .kody-engine/action-state.json > .kody-engine/action-state.json.tmp && \
              mv .kody-engine/action-state.json.tmp .kody-engine/action-state.json

            git add .kody-engine/action-state.json .kody/sessions/${SESSION_ID}.jsonl 2>/dev/null || true
            git commit --quiet -m "chore: enqueue initial message for ${SESSION_ID}" 2>/dev/null || true
            git push --quiet origin HEAD 2>/dev/null || true
          fi

          kody-engine chat \
            --session "$SESSION_ID" \
            --model "$MODEL" \
            --poll \
            --cwd .

      - name: Upload session artifacts
        if: always()
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: chat-session-${{ github.event.inputs.sessionId }}
          path: |
            .kody/sessions/${{ github.event.inputs.sessionId }}.jsonl
            .kody/events/${{ github.event.inputs.sessionId }}.jsonl
          retention-days: 3

  # ─── Watch ───────────────────────────────────────────────────────────────────
  watch:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.agent != '')
    runs-on: ubuntu-latest
    timeout-minutes: 360
    concurrency:
      group: kody-watch
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Claude Code
        if: hashFiles('.kody/watch/agents/*/agent.json') != ''
        run: npm install -g @anthropic-ai/claude-code

      - name: Install Kody Engine
        run: npm install -g @kody-ade/engine

      - name: Install LiteLLM proxy
        if: hashFiles('.kody/watch/agents/*/agent.json') != ''
        run: pip install 'litellm[proxy]' prisma && python -m prisma py fetch

      - name: Export project secrets
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
        run: kody-engine ci-export-secrets

      - name: Verify GH_TOKEN source
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          GH_TOKEN_DEFAULT: ${{ github.token }}
        run: |
          if [ "$GH_TOKEN" = "$GH_TOKEN_DEFAULT" ]; then
            echo "GH_TOKEN is the default github.token (GH_PAT secret may be empty)"
          else
            echo "GH_TOKEN is from GH_PAT secret"
          fi
          echo "Token prefix: ${GH_TOKEN:0:4}..."
          gh auth status

      - name: Run Kody Watch
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          REPO: ${{ github.repository }}
          WATCH_ACTIVITY_LOG: ${{ vars.WATCH_ACTIVITY_LOG }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          ARGS=""
          [ "${{ inputs.dry_run }}" = "true" ] && ARGS="$ARGS --dry-run"
          [ -n "${{ inputs.agent }}" ] && ARGS="$ARGS --agent ${{ inputs.agent }}"
          kody-engine watch $ARGS
