name: kody-nightly-tests

# Runs the consumer-repo executable `nightly-tests` once per day.
# Mirrors kody.yml's auth/setup pattern but invokes the executable directly.
# Manual trigger via workflow_dispatch is supported for re-running on demand
# (optionally with a `filter` regex to scope to one failing case).

on:
  workflow_dispatch:
    inputs:
      filter:
        description: "Optional regex; only test cases whose `name` matches are run"
        type: string
        default: ""
  schedule:
    - cron: "0 2 * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: kody-nightly-tests
      cancel-in-progress: false
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.KODY_TOKEN || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Write pip cache key for LiteLLM
        run: echo "litellm[proxy]" > .kody-pip-requirements.txt

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: .kody-pip-requirements.txt

      - name: Install litellm for engine model proxy
        run: pip install 'litellm[proxy]'

      # Unpack ALL_SECRETS into the environment so the kody engine and
      # gh CLI both pick up GH_PAT, MINIMAX_API_KEY, etc. without requiring
      # the executable itself to do the same preflight kody-cli.ts does for
      # `kody ci` / `kody chat`. Also pin GH_TOKEN to GH_PAT (or the runner's
      # github.token) so `gh auth status` passes.
      - name: Unpack secrets into env
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
        run: |
          python3 <<'PY' >> "$GITHUB_ENV"
          import json, os, sys
          raw = os.environ.get("ALL_SECRETS") or "{}"
          for k, v in json.loads(raw).items():
              if not v or "\n" in str(v):
                  continue
              print(f"{k}={v}")
          PY

      - name: Configure GH_TOKEN for gh CLI
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          DEFAULT_TOKEN: ${{ secrets.KODY_TOKEN || github.token }}
        run: |
          if [ -n "$GH_PAT" ]; then
            echo "GH_TOKEN=$GH_PAT" >> "$GITHUB_ENV"
          else
            echo "GH_TOKEN=$DEFAULT_TOKEN" >> "$GITHUB_ENV"
          fi

      - env:
          FILTER: ${{ inputs.filter }}
        run: |
          if [ -n "$FILTER" ]; then
            npx -y -p @kody-ade/kody-engine@latest kody nightly-tests --filter "$FILTER"
          else
            npx -y -p @kody-ade/kody-engine@latest kody nightly-tests
          fi
