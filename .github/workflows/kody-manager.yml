name: kody-manager

# Schedule: every 5 minutes. Also triggerable on demand via workflow_dispatch
# (useful for demos and one-off ticks without waiting for the cron).
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: kody-manager-${{ github.repository }}
      cancel-in-progress: false
    permissions:
      issues: write
      pull-requests: read
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.KODY_TOKEN || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Write pip cache key for LiteLLM
        run: echo "litellm[proxy]" > .kody-pip-requirements.txt

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: .kody-pip-requirements.txt

      - env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
          GH_TOKEN: ${{ secrets.KODY_TOKEN || secrets.GH_PAT || github.token }}
          GH_PAT: ${{ secrets.GH_PAT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: npx -y -p @kody-ade/kody-engine@latest kody manager
