name: kody-watch

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: false
        description: "Run without executing actions"
      agent:
        description: "Agent to run (omit for all)"
        required: false
        type: string

concurrency:
  group: kody-watch

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Claude Code
        if: hashFiles('.kody/watch/agents/*/agent.json') != ''
        run: npm install -g @anthropic-ai/claude-code

      - name: Install Kody Engine
        run: npm install -g @kody-ade/engine

      - name: Install LiteLLM proxy
        if: hashFiles('.kody/watch/agents/*/agent.json') != ''
        run: pip install 'litellm[proxy]' prisma && python -m prisma py fetch

      - name: Export project secrets
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
        run: |
          echo "$ALL_SECRETS" | jq -r 'to_entries[] | select(.key | test("^(GITHUB_TOKEN)$") | not) | @json' | while IFS= read -r entry; do
            KEY=$(echo "$entry" | jq -r '.key')
            VALUE=$(echo "$entry" | jq -r '.value')
            DELIM="KODY_EOF_${KEY}"
            echo "${KEY}<<${DELIM}" >> $GITHUB_ENV
            echo "${VALUE}" >> $GITHUB_ENV
            echo "${DELIM}" >> $GITHUB_ENV
          done

      - name: Verify GH_TOKEN source
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          GH_TOKEN_DEFAULT: ${{ github.token }}
        run: |
          if [ "$GH_TOKEN" = "$GH_TOKEN_DEFAULT" ]; then
            echo "⚠️ GH_TOKEN is the default github.token (GH_PAT secret may be empty)"
          else
            echo "✅ GH_TOKEN is from GH_PAT secret"
          fi
          echo "Token prefix: ${GH_TOKEN:0:4}..."
          gh auth status

      - name: Run Kody Watch
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          REPO: ${{ github.repository }}
          WATCH_ACTIVITY_LOG: ${{ vars.WATCH_ACTIVITY_LOG }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          ARGS=""
          [ "${{ inputs.dry_run }}" = "true" ] && ARGS="$ARGS --dry-run"
          [ -n "${{ inputs.agent }}" ] && ARGS="$ARGS --agent ${{ inputs.agent }}"
          kody-engine watch $ARGS
